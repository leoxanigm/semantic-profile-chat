services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 1m30s
      timeout: 5s
      retries: 10
      start_period: 10s
      start_interval: 5s
      

  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama-data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    command: ["pull", "nomic-embed-text"]

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3000"
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: nomic-embed-text
      DATA_MODEL_PATH: /data/data-model.json
      MATCH_THRESHOLD: "0.60"
      QUERY_MAX_LENGTH: "500"
      SUGGESTION_COUNT: "3"
    volumes:
      - ./server/data/data-model.json:/data/data-model.json:ro
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  ollama-data: